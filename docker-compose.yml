# VoltList — pull the published GHCR image, expose it on :3021, and persist the
# SQLite database in a named volume. Fully self-contained: every setting is inline
# below, so NO .env file is required.
#
# Quickstart:
#   docker compose up -d      # then open http://localhost:3021
#
# The JWT_SECRET below is a generated default so this runs out of the box. NOTE:
# this repo is public, so anyone can read that secret — fine for a trusted LAN.
# If VoltList is reachable from the internet, replace it with your own:
#   openssl rand -hex 32

services:
  voltlist:
    image: ghcr.io/atvriders/voltlist:latest
    # --- Local build alternative -------------------------------------------
    # To build the image from source instead of pulling from GHCR, comment out
    # the `image:` line above and uncomment the next line, then `docker compose up --build`.
    # build: .
    container_name: voltlist
    restart: unless-stopped
    ports:
      # host 3021 -> container 8080 (the server listens on 8080 inside the container)
      - "3021:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      # Generated default (see header note). Replace for any internet-facing deploy.
      JWT_SECRET: "b1cb0f5bf6e7b9ccf45a5b5b83af6acd6a0ca649a50dc2f77a60e9b18b215c6d"
      DATABASE_URL: "file:/data/voltlist.db"
      CARS_PATH: "/app/data/cars.json"
      # Mark the login cookie Secure (HTTPS-only). Keep "false" for plain-HTTP LAN
      # access (http://host:3021); set "true" only when serving behind HTTPS/TLS.
      COOKIE_SECURE: "false"
    volumes:
      - voltlist-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  voltlist-data:
